name: Paguro
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.44.0
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  Paguro:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azuic.paguro
        PRODUCT_NAME: Paguro
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Paguro
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026 azuic
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
